      background: #fff;
      color: #1a1a1a;

    /* Reveals */
    .rv    { opacity:0; transform:translateY(24px);  transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
    .rv-l  { opacity:0; transform:translateX(-28px); transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
    .rv-r  { opacity:0; transform:translateX(28px);  transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
    .rv.in, .rv-l.in, .rv-r.in { opacity:1; transform:none; }

    /* Phone float */
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }

    /* Marquee */
    @keyframes mq { from{transform:translateX(0)} to{transform:translateX(-50%)} }
    .mq-track { display:flex; animation: mq 30s linear infinite; width:max-content; }

    /* Interactions */
    .hover-lift { transition: transform .2s ease, box-shadow .2s ease; cursor:pointer; }
    .hover-lift:hover { transform:translateY(-3px); box-shadow:0 10px 32px rgba(0,0,0,.1); }

    .nav-ul li a::after {

const { useState, useEffect, useRef } = React;

/* ── tokens ── */
const T = {
  white:'#ffffff', gray:'#F8F6F5', border:'#EAE6E2',
  text:'#1A1A1A', text2:'#6B6360', text3:'#ABA5A0',
  accent:'#E67E50',
  hot:'#E67E50', warm:'#D4A574', mild:'#B8C5A0', cool:'#8FB5D5',
};
const tc = v => v>=90?T.hot:v>=75?T.warm:v>=60?T.mild:T.cool;

/* ── hooks ── */
const useReveal = (cls, delay=0) => {
  const ref = useRef(null);
  useEffect(()=>{
    const el=ref.current; if(!el) return;
    const ob=new IntersectionObserver(([e])=>{
      if(e.isIntersecting) setTimeout(()=>el.classList.add('in'),delay);
    },{threshold:.1});
    ob.observe(el);
    return ()=>ob.disconnect();
  },[delay]);
  return ref;
};

const useIsMobile = () => {
  const [v, setV] = useState(()=>window.innerWidth < 768);
  useEffect(()=>{
    const fn = ()=>setV(window.innerWidth < 768);
    window.addEventListener('resize', fn);
    return ()=>window.removeEventListener('resize', fn);
  },[]);
  return v;
};
