    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var q = window.location.search;
        if (q && q.indexOf('p=') > -1) {
          var p = q.slice(1).split('&').reduce(function(r, v) {
            return r || (v.indexOf('p=') === 0 ? v.slice(2) : null);
          }, null);
          if (p) history.replaceState(null, null, '/clover-wireframe/soap-admin-dashboard' + p);
        }
      })();
    </script>
